name: Mise à jour des données (YouTube + Genshin)

on:
  schedule:
    # deux fois par jour (UTC)
    - cron: "17 7,19 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: node scripts/fetch-data.mjs
      - name: Commit et redéploiement si les données ont changé
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "Aucun changement dans les données."
          else
            git commit -m "chore: mise à jour automatique des données"
            git push
            # un push fait par GITHUB_TOKEN ne déclenche pas les autres
            # workflows : on lance le déploiement explicitement
            gh workflow run deploy.yml
          fi
